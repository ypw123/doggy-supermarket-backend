services:
  postgres:
    image: docker.m.daocloud.io/library/postgres:16-alpine
    container_name: pawberry-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pawberry
    ports:
      - "5432:5432"
    volumes:
      - pawberry-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pawberry"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  pawberry-postgres-data:
